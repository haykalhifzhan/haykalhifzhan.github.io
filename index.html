<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            text-align: center;
            background: #4CAF50;
            color: white;
            padding: 2em 0;
        }
        header h1 {
            margin: 0;
        }
        header p {
            margin: 5px 0 20px;
        }
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .profile img {
            border-radius: 50%;
            width: 150px;
            height: 150px;
            margin-bottom: 15px;
        }
        .profile h2 {
            margin: 10px 0;
            font-size: 24px;
        }
        .profile p {
            font-size: 18px;
            text-align: center;
            max-width: 600px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .social-links a {
            text-decoration: none;
            color: white;
            background: #4CAF50;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .social-links a:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
        <p>Frontend Developer | UI/UX Enthusiast</p>
    </header>

    <div class="profile">
        <img src="https://via.placeholder.com/150" alt="Profile Picture">
        <h2>Your Name</h2>
        <p>Hello! I am a frontend developer passionate about building beautiful and functional web applications. I love coding and solving problems.</p>

        <div class="social-links">
            <a href="#" onclick="alert('Redirecting to LinkedIn')">LinkedIn</a>
            <a href="#" onclick="alert('Redirecting to GitHub')">GitHub</a>
            <a href="#" onclick="alert('Redirecting to Twitter')">Twitter</a>
        </div>
    </div>

    <script>
        // Simple interactivity for alerting social media redirection
        console.log("Portfolio loaded successfully!");
    </script>
</body>
</html>
